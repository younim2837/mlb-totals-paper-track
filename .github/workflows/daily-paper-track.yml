name: Daily Paper Track

on:
  schedule:
    # 17:07 UTC = 10:07 PT during daylight saving, 09:07 PT otherwise.
    # Offset from the top of the hour to avoid GitHub's heaviest scheduler load.
    - cron: "7 17 * * *"
    # Backup trigger in case GitHub delays or skips the primary scheduled run.
    - cron: "37 17 * * *"
  workflow_dispatch:
    inputs:
      run_date:
        description: "Target date YYYY-MM-DD. Leave blank for current Pacific date."
        required: false
        type: string
      quick:
        description: "Skip pitcher refresh"
        required: false
        default: false
        type: boolean
      no_update:
        description: "Skip all data refreshes"
        required: false
        default: false
        type: boolean
      all_games:
        description: "Also generate the all-games report variant"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: daily-paper-track-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-paper-track:
    runs-on: ubuntu-latest
    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      RUN_DATE: ${{ inputs.run_date }}
      RUN_QUICK: ${{ inputs.quick }}
      RUN_NO_UPDATE: ${{ inputs.no_update }}
      RUN_ALL_GAMES: ${{ inputs.all_games }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve target date
        id: target-date
        shell: bash
        run: |
          target_date="${RUN_DATE}"
          if [ -z "${target_date}" ]; then
            target_date="$(TZ=America/Los_Angeles date +%F)"
          fi
          echo "target_date=${target_date}" >> "$GITHUB_OUTPUT"

      - name: Check for existing successful run
        id: guard
        if: ${{ github.event_name == 'schedule' }}
        shell: bash
        run: |
          manifest="paper_tracking/runs/${{ steps.target-date.outputs.target_date }}.json"
          if [ ! -f "${manifest}" ]; then
            echo "skip_run=false" >> "$GITHUB_OUTPUT"
            echo "No existing run manifest for ${manifest}; continuing."
            exit 0
          fi

          if python -c "import json, sys; data = json.load(open(sys.argv[1], encoding='utf-8')); raise SystemExit(0 if int(data.get('return_code', 1)) == 0 else 1)" "${manifest}"; then
            echo "skip_run=true" >> "$GITHUB_OUTPUT"
            echo "Existing successful manifest found at ${manifest}; skipping duplicate scheduled run."
          else
            echo "skip_run=false" >> "$GITHUB_OUTPUT"
            echo "Existing manifest indicates an unsuccessful run; continuing with backup schedule."
          fi

      - name: Skip duplicate scheduled run
        if: ${{ steps.guard.outputs.skip_run == 'true' }}
        run: echo "Skipping duplicate scheduled Daily Paper Track run for ${{ steps.target-date.outputs.target_date }}."

      - name: Install dependencies
        if: ${{ steps.guard.outputs.skip_run != 'true' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run daily paper test
        if: ${{ steps.guard.outputs.skip_run != 'true' }}
        shell: bash
        run: |
          args=()
          if [ -n "${RUN_DATE}" ]; then
            args+=("${RUN_DATE}")
          fi
          if [ "${RUN_QUICK}" = "true" ]; then
            args+=("--quick")
          fi
          if [ "${RUN_NO_UPDATE}" = "true" ]; then
            args+=("--no-update")
          fi
          if [ "${RUN_ALL_GAMES}" = "true" ]; then
            args+=("--all-games")
          fi
          python paper_track_daily.py "${args[@]}"

      - name: Refresh season trackers
        if: ${{ steps.guard.outputs.skip_run != 'true' }}
        shell: bash
        run: |
          season="$(TZ=America/Los_Angeles date +%Y)"
          python grade_paper_tracking.py --season "${season}"
          python build_dashboard.py --season "${season}"

      - name: Commit generated files
        if: ${{ steps.guard.outputs.skip_run != 'true' }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data predictions paper_tracking docs
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          target_date="${{ steps.target-date.outputs.target_date }}"
          git commit -m "Automated paper-track run for ${target_date}"
          git push
